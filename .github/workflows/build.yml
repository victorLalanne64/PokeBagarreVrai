name: Java CI
#
on: push

jobs:
  build:
    name : Integration Continue = tests + build + generation rapports AUTO
    runs-on: ubuntu-latest
    permissions:
      checks: write
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'zulu'
      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v1
        #uses: gradle/wrapper-validation-action@e6e38bacfdf1a337459f332974bb2327a31aaf4b
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
      - name: Make gradlew executable
        run:  chmod +x ./gradlew
      - name: Build & test and compute JaCoCo reports
        run: ./gradlew build jacocoTestReport

      # Etape d'upload des résultats de tests avec Test Reporter
      - name: Upload test results to GitHub with Test Reporter
        uses: mikeal/test-reporter-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          report_url: ./build/reports/tests/test/index.html  # Chemin vers le rapport de test généré
        continue-on-error: true